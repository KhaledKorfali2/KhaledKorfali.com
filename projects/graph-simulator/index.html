<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Graphvis — Graph Algorithm Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="tutorial.css">
</head>
<body>

  <header id="hdr">
    <div id="hdr-left">
      <span id="logo">GRAPHVIS</span>
      <span id="tagline">graph algorithm visualizer</span>
    </div>
    <div id="hdr-stats">
      <div class="stat"><span class="stat-val" id="st-visited">0</span><span class="stat-lbl">visited</span></div>
      <div class="stat"><span class="stat-val" id="st-queued">0</span><span class="stat-lbl">queued</span></div>
      <div class="stat"><span class="stat-val" id="st-edges">0</span><span class="stat-lbl">relaxed</span></div>
      <div class="stat"><span class="stat-val" id="st-cost">—</span><span class="stat-lbl">cost</span></div>
    </div>
  </header>

  <nav id="algo-nav">
    <button class="algo-btn active" data-algo="bfs">BFS</button>
    <button class="algo-btn" data-algo="dfs">DFS</button>
    <button class="algo-btn" data-algo="dijkstra">Dijkstra's</button>
    <button class="algo-btn" data-algo="astar">A*</button>
    <button class="algo-btn" data-algo="bellman">Bellman-Ford</button>
    <button class="algo-btn" data-algo="bidir">Bi-BFS</button>
    <button class="algo-btn" data-algo="prim">Prim's MST</button>
    <button class="algo-btn" data-algo="kruskal">Kruskal's MST</button>
    <button class="algo-btn" data-algo="topo">Topo Sort</button>
    <button class="algo-btn" data-algo="floyd">Floyd-Warshall</button>
  </nav>

  <main id="main">

    <section id="vis-wrap">
      <canvas id="vis"></canvas>

      <!-- Inline weight picker (replaces prompt()) -->
      <div id="weight-picker">
        <label>EDGE WEIGHT</label>
        <div id="weight-picker-row">
          <input type="range" id="weight-input" min="1" max="20" value="5">
          <span id="weight-val-display">5</span>
        </div>
        <div id="weight-picker-btns">
          <button class="wp-btn" id="wp-cancel">Cancel</button>
          <button class="wp-btn confirm" id="wp-confirm">Add Edge</button>
        </div>
      </div>

      <!-- Graph toolbar -->
      <div id="graph-toolbar">
        <button class="tool-btn active" id="tool-select" title="Select / move (tap=set start, long-press=set end)">&#9654;</button>
        <button class="tool-btn" id="tool-node"   title="Add node">&#11044;</button>
        <button class="tool-btn" id="tool-edge"   title="Add edge">&#9135;</button>
        <button class="tool-btn" id="tool-delete" title="Delete">&#10005;</button>
        <div class="tool-sep"></div>
        <button class="tool-btn" id="tool-gen-random" title="Random graph">&#9760;</button>
        <button class="tool-btn" id="tool-gen-grid"   title="Grid graph">&#9638;</button>
        <button class="tool-btn" id="tool-clear"      title="Clear">&#9723;</button>
        <div class="tool-sep"></div>
        <label class="tool-check" title="Directed graph"><input type="checkbox" id="chk-directed"> DIR</label>
        <label class="tool-check" title="Show weights"><input type="checkbox" id="chk-weighted" checked> WGT</label>
        <div class="tool-sep"></div>
        <button class="tool-btn" id="btn-info-tool" title="Algorithm info">&#9432;</button>
      </div>

      <div id="role-hint">
        <span class="role-dot start"></span>S
        <span class="role-dot end"></span>E
        <span class="role-dot" style="background:var(--visited)"></span>Visited
        <span class="role-dot" style="background:var(--frontier)"></span>Front.
        <span class="role-dot" style="background:var(--path)"></span>Path
      </div>
    </section>

    <aside id="info-panel">
      <div id="panel-handle"><div id="panel-handle-bar"></div></div>
      <div id="algo-name-wrap">
        <h2 id="algo-title">BFS</h2>
        <div id="complexity-row">
          <span class="badge" id="badge-time"></span>
          <span class="badge" id="badge-space"></span>
          <span class="badge" id="badge-optimal"></span>
        </div>
      </div>
      <p id="algo-desc"></p>
      <div id="step-log-wrap">
        <div id="step-log-label">CURRENT STEP</div>
        <div id="step-log"></div>
      </div>
    </aside>

  </main>

  <footer id="controls">
    <div id="ctrl-left">
      <div class="ctrl-group">
        <label class="ctrl-label">SPEED</label>
        <input type="range" id="sl-speed" min="1" max="10" value="5">
        <span class="ctrl-val" id="v-speed">5</span>
      </div>
    </div>
    <div id="ctrl-center">
      <button class="ctrl-btn" id="btn-reset"     title="Reset traversal">&#8635;</button>
      <button class="ctrl-btn" id="btn-step-back" title="Step back">&#9664;&#9664;</button>
      <button class="ctrl-btn primary" id="btn-play" title="Play/Pause">&#9654;</button>
      <button class="ctrl-btn" id="btn-step-fwd"  title="Step forward">&#9654;&#9654;</button>
      <button class="ctrl-btn" id="btn-end"        title="Jump to end">&#9654;|</button>
    </div>
    <div id="ctrl-right">
      <span id="status-label"></span>
      <div id="progress-wrap">
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <span id="progress-text">0 / 0</span>
      </div>
    </div>
    <div id="ctrl-mobile-extra">
      <div class="ctrl-group">
        <label class="ctrl-label">SPEED</label>
        <input type="range" id="sl-speed-m" min="1" max="10" value="5">
        <span class="ctrl-val" id="v-speed-m">5</span>
      </div>
    </div>
  </footer>

  <script src="engine.js"></script>
  <script src="app.js"></script>
  <script src="tutorial.js"></script>
  <script src="graphvis-tutorial.js"></script>
</body>
</html>
