<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game of Life</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <canvas id="canvas"></canvas>

  <!-- Floating tooltip -->
  <div id="tooltip" role="tooltip"></div>

  <!-- ── Top bar ── -->
  <header id="topbar">
    <div id="title">
      <span class="title-main">Game of Life</span>
      <span class="title-rule" id="ruleDisplay">B3/S23</span>
    </div>
    <div id="stats">
      <div class="stat">
        <span class="stat-val" id="statGen">0</span>
        <span class="stat-lbl">gen</span>
      </div>
      <div class="stat-sep"></div>
      <div class="stat">
        <span class="stat-val" id="statPop">0</span>
        <span class="stat-lbl">cells</span>
      </div>
      <div class="stat-sep"></div>
      <div class="stat">
        <span class="stat-val" id="statFps">—</span>
        <span class="stat-lbl">fps</span>
      </div>
    </div>
  </header>

  <!-- ══════════════════════════════════════
       DESKTOP PANEL
  ══════════════════════════════════════ -->
  <div id="panel" class="desktop-only">

    <!-- Row 1: transport -->
    <div class="panel-row" id="transport">
      <button class="ctrl-btn" id="playBtn"
        data-tip="Start or pause the simulation · Space">
        <svg id="playIcon"  viewBox="0 0 16 16" fill="currentColor" width="15" height="15"><path d="M4 2.5l10 5.5-10 5.5V2.5z"/></svg>
        <svg id="pauseIcon" viewBox="0 0 16 16" fill="currentColor" width="15" height="15" style="display:none"><rect x="3" y="2" width="4" height="12" rx="1"/><rect x="9" y="2" width="4" height="12" rx="1"/></svg>
        <span id="playLabel">Play</span>
      </button>

      <button class="ctrl-btn" id="stepBtn"
        data-tip="Advance exactly one generation · . or →">
        <svg viewBox="0 0 16 16" fill="currentColor" width="15" height="15"><path d="M3 2.5l8 5.5-8 5.5V2.5z"/><rect x="12" y="2" width="2.5" height="12" rx="1"/></svg>
        Step
      </button>

      <button class="ctrl-btn secondary" id="clearBtn"
        data-tip="Erase all cells and reset generation counter · C">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" width="14" height="14"><path d="M3 3l10 10M13 3L3 13"/></svg>
        Clear
      </button>

      <button class="ctrl-btn secondary" id="randomBtn"
        data-tip="Fill the grid with ~30% randomly alive cells · R">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M2 5h2.5l2 3 2-5 2 5 1.5-3H14"/><path d="M2 11h2.5l1-2"/><path d="M12 9l1-2 1 2"/></svg>
        Random
      </button>

      <div class="transport-sep"></div>

      <div class="ctrl-group"
        data-tip="Cap the simulation speed in generations per second">
        <span class="ctrl-lbl">Speed</span>
        <div class="seg" id="speedSeg">
          <button class="seg-btn" data-fps="1">1</button>
          <button class="seg-btn" data-fps="5">5</button>
          <button class="seg-btn" data-fps="15">15</button>
          <button class="seg-btn active" data-fps="30">30</button>
          <button class="seg-btn" data-fps="60">Max</button>
        </div>
        <span class="ctrl-unit">fps</span>
      </div>
    </div>

    <div class="panel-divider"></div>

    <!-- Row 2: settings -->
    <div class="panel-row" id="settings">

      <div class="ctrl-group"
        data-tip="A dead cell is born when it has exactly this many live neighbours">
        <span class="ctrl-lbl">Born</span>
        <div class="bit-row" id="bornBits"></div>
      </div>

      <div class="rule-sep"></div>

      <div class="ctrl-group"
        data-tip="A live cell survives when it has exactly this many live neighbours">
        <span class="ctrl-lbl">Survive</span>
        <div class="bit-row" id="surviveBits"></div>
      </div>

      <div class="rule-sep"></div>

      <div class="ctrl-group">
        <span class="ctrl-lbl">Rules</span>
        <div class="seg" id="ruleSeg">
          <button class="seg-btn active" data-rule="B3/S23"
            data-tip="Conway's original — rich, chaotic, supports gliders and still lifes">Life</button>
          <button class="seg-btn" data-rule="B36/S23"
            data-tip="Like Life but cells born with 6 neighbours too — creates self-replicating patterns">Highlife</button>
          <button class="seg-btn" data-rule="B3/S12345"
            data-tip="Cells survive with 1–5 neighbours — grows organic maze-like corridors">Maze</button>
          <button class="seg-btn" data-rule="B3678/S34678"
            data-tip="Symmetric rule where live and dead regions behave identically">Day&amp;Night</button>
          <button class="seg-btn" data-rule="B2/S"
            data-tip="No cell ever survives — explosive single-generation bursts">Seeds</button>
        </div>
      </div>

      <div class="rule-sep"></div>

      <div class="ctrl-group">
        <span class="ctrl-lbl">Colour</span>
        <div class="seg" id="colourSeg">
          <button class="seg-btn active" data-mode="phosphor"
            data-tip="Cells shift from icy blue (newborn) → green → amber as they age">Phosphor</button>
          <button class="seg-btn" data-mode="heat"
            data-tip="Thermal view — dark red for young cells, bright yellow for long-lived ones">Heat</button>
          <button class="seg-btn" data-mode="mono"
            data-tip="Classic flat phosphor green, no age colouring">Mono</button>
        </div>
      </div>

      <div class="rule-sep"></div>

      <div class="ctrl-group">
        <span class="ctrl-lbl">Edge</span>
        <div class="seg" id="edgeSeg">
          <button class="seg-btn active" data-edge="wrap"
            data-tip="Toroidal grid — cells leaving one edge re-enter from the opposite side">Wrap</button>
          <button class="seg-btn" data-edge="dead"
            data-tip="Hard boundary — cells outside the grid are treated as permanently dead">Dead</button>
        </div>
      </div>

      <div class="rule-sep"></div>

      <div class="ctrl-group">
        <span class="ctrl-lbl">Pattern</span>
        <div class="seg" id="patternSeg">
          <button class="seg-btn" data-pattern="glider"
            data-tip="A 5-cell pattern that moves diagonally forever — the simplest spaceship">Glider</button>
          <button class="seg-btn" data-pattern="pulsar"
            data-tip="A period-3 oscillator — one of the most common large patterns">Pulsar</button>
          <button class="seg-btn" data-pattern="gun"
            data-tip="Gosper Glider Gun — endlessly emits a stream of gliders">Gun</button>
          <button class="seg-btn" data-pattern="rpent"
            data-tip="R-pentomino — 5 cells that generate chaos for 1,103 generations">R-pent</button>
          <button class="seg-btn" data-pattern="diehard"
            data-tip="Diehard — vanishes completely after exactly 130 generations">Diehard</button>
        </div>
      </div>

    </div>
  </div>

  <!-- ══════════════════════════════════════
       MOBILE UI
  ══════════════════════════════════════ -->
  <div id="mobileUI" class="mobile-only">

    <!-- Backdrop behind sheet -->
    <div id="sheetBackdrop"></div>

    <!-- Settings sheet -->
    <div id="sheet">
      <div id="sheetHandle"></div>
      <div id="sheetContent">

        <!-- Rule editor -->
        <div class="sheet-card">
          <div class="sheet-card-header">
            <span class="sheet-card-title">Rule Editor</span>
            <span class="sheet-card-sub" id="mobileRuleDisplay">B3/S23</span>
          </div>
          <div class="sheet-rule-row">
            <span class="sheet-rule-label">Born</span>
            <div class="bit-row large" id="bornBitsMobile"></div>
          </div>
          <div class="sheet-rule-row">
            <span class="sheet-rule-label">Survive</span>
            <div class="bit-row large" id="surviveBitsMobile"></div>
          </div>
        </div>

        <!-- Rule presets -->
        <div class="sheet-card">
          <div class="sheet-card-header">
            <span class="sheet-card-title">Rule Presets</span>
          </div>
          <div class="sheet-grid" id="ruleSegMobile">
            <button class="sheet-btn active" data-rule="B3/S23">
              <span class="sheet-btn-name">Life</span>
              <span class="sheet-btn-desc">The classic. Rich and chaotic.</span>
            </button>
            <button class="sheet-btn" data-rule="B36/S23">
              <span class="sheet-btn-name">Highlife</span>
              <span class="sheet-btn-desc">Creates self-replicating patterns.</span>
            </button>
            <button class="sheet-btn" data-rule="B3/S12345">
              <span class="sheet-btn-name">Maze</span>
              <span class="sheet-btn-desc">Grows dense organic corridors.</span>
            </button>
            <button class="sheet-btn" data-rule="B3678/S34678">
              <span class="sheet-btn-name">Day &amp; Night</span>
              <span class="sheet-btn-desc">Live and dead regions mirror each other.</span>
            </button>
            <button class="sheet-btn" data-rule="B2/S">
              <span class="sheet-btn-name">Seeds</span>
              <span class="sheet-btn-desc">Explosive single-gen bursts, never stable.</span>
            </button>
          </div>
        </div>

        <!-- Patterns -->
        <div class="sheet-card">
          <div class="sheet-card-header">
            <span class="sheet-card-title">Stamp Pattern</span>
            <span class="sheet-card-sub">Pauses sim · stamps at centre</span>
          </div>
          <div class="sheet-grid" id="patternSegMobile">
            <button class="sheet-btn" data-pattern="glider">
              <span class="sheet-btn-name">Glider</span>
              <span class="sheet-btn-desc">Moves diagonally forever.</span>
            </button>
            <button class="sheet-btn" data-pattern="pulsar">
              <span class="sheet-btn-name">Pulsar</span>
              <span class="sheet-btn-desc">Period-3 oscillator.</span>
            </button>
            <button class="sheet-btn" data-pattern="gun">
              <span class="sheet-btn-name">Glider Gun</span>
              <span class="sheet-btn-desc">Endlessly fires gliders.</span>
            </button>
            <button class="sheet-btn" data-pattern="rpent">
              <span class="sheet-btn-name">R-pentomino</span>
              <span class="sheet-btn-desc">5 cells → 1,103 gen of chaos.</span>
            </button>
            <button class="sheet-btn" data-pattern="diehard">
              <span class="sheet-btn-name">Diehard</span>
              <span class="sheet-btn-desc">Vanishes after 130 generations.</span>
            </button>
          </div>
        </div>

        <!-- Display options -->
        <div class="sheet-card">
          <div class="sheet-card-header">
            <span class="sheet-card-title">Display</span>
          </div>
          <div class="sheet-option-row">
            <span class="sheet-option-label">Colour</span>
            <div class="seg large" id="colourSegMobile">
              <button class="seg-btn active" data-mode="phosphor">Phosphor</button>
              <button class="seg-btn" data-mode="heat">Heat</button>
              <button class="seg-btn" data-mode="mono">Mono</button>
            </div>
          </div>
          <div class="sheet-option-row">
            <span class="sheet-option-label">Edge</span>
            <div class="seg large" id="edgeSegMobile">
              <button class="seg-btn active" data-edge="wrap">Wrap</button>
              <button class="seg-btn" data-edge="dead">Dead</button>
            </div>
          </div>
        </div>

        <div style="height:8px"></div>
      </div>
    </div>

    <!-- Persistent bottom transport bar -->
    <div id="mobileBar">
      <div class="mbar-group">
        <button class="mbar-btn primary" id="mobilePlayBtn" data-tip="Play / Pause">
          <svg id="mobilePlayIcon"  viewBox="0 0 16 16" fill="currentColor" width="18" height="18"><path d="M4 2.5l10 5.5-10 5.5V2.5z"/></svg>
          <svg id="mobilePauseIcon" viewBox="0 0 16 16" fill="currentColor" width="18" height="18" style="display:none"><rect x="3" y="2" width="4" height="12" rx="1"/><rect x="9" y="2" width="4" height="12" rx="1"/></svg>
        </button>
        <button class="mbar-btn" id="mobileStepBtn" data-tip="Step one generation">
          <svg viewBox="0 0 16 16" fill="currentColor" width="18" height="18"><path d="M3 2.5l8 5.5-8 5.5V2.5z"/><rect x="12" y="2" width="2.5" height="12" rx="1"/></svg>
        </button>
      </div>

      <div class="mbar-group">
        <span class="mbar-label">Speed</span>
        <div class="speed-dots" id="mobileSpeedSeg">
          <button class="sdot" data-fps="1"  data-tip="1 gen/sec">●</button>
          <button class="sdot" data-fps="5"  data-tip="5 gen/sec">●</button>
          <button class="sdot" data-fps="15" data-tip="15 gen/sec">●</button>
          <button class="sdot active" data-fps="30" data-tip="30 gen/sec">●</button>
          <button class="sdot" data-fps="60" data-tip="Maximum speed">●</button>
        </div>
      </div>

      <div class="mbar-group">
        <button class="mbar-btn" id="mobileClearBtn"  data-tip="Clear the grid">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" width="18" height="18"><path d="M3 3l10 10M13 3L3 13"/></svg>
        </button>
        <button class="mbar-btn" id="mobileRandomBtn" data-tip="Fill randomly">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M2 5h2.5l2 3 2-5 2 5 1.5-3H14"/><path d="M2 11h2.5l1-2"/><path d="M12 9l1-2 1 2"/></svg>
        </button>
        <button class="mbar-btn settings" id="settingsBtn" data-tip="Open settings">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
            <circle cx="8" cy="8" r="2.2"/>
            <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M11.4 4.6l-1.4 1.4M4.6 11.4l-1.4 1.4"/>
          </svg>
        </button>
      </div>
    </div>

  </div><!-- /mobileUI -->

  <!-- Draw hint -->
  <div id="drawHint">Click or drag to draw cells</div>

  <script src="script.js"></script>
</body>
</html>
