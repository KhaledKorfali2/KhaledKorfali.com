<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Particle Sandbox</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="setting">

    <select id="particleType">
      <option value="sand"  selected>🟡 Sand</option>
      <option value="water">💧 Water</option>
      <option value="fire"> 🔥 Fire</option>
      <option value="smoke">💨 Smoke</option>
      <option value="wall"> 🧱 Wall</option>
      <option value="eraser">🧹 Eraser</option>
    </select>

    <select id="brushMode">
      <option value="deposit" selected>Deposit</option>
      <option value="surface">Surface</option>
    </select>

    <div id="colorControls" style="display:flex;align-items:center;gap:6px;">
      <input type="color" id="colorPicker" value="#e6b84a">
      <label style="display:flex;align-items:center;gap:4px;font-size:13px;">
        <input type="checkbox" id="autoHueToggle" checked>
        Auto Hue
      </label>
    </div>

    <button id="resetBtn">Reset</button>

  </div>

  <script src="script.js"></script>
</body>
</html>
