<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Particle Sandbox</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="canvas"></canvas>

  <!-- HUD: top-left stats -->
  <div id="hud">
    <span id="fpsCounter">— fps</span>
    <span id="particleCounter">0 particles</span>
  </div>

  <!--
    Toolbar:
      Collapsed = compact pill with quick-select dots + expand button
      Expanded  = full panel slides up above the pill
  -->
  <div id="toolbar" aria-label="Controls">

    <!-- Always-visible pill -->
    <div id="pill">

      <!-- Active element badge -->
      <div id="pillActive">
        <span id="pillDot" class="elem-dot" style="background:#e6b84a"></span>
        <span id="pillLabel">Sand</span>
      </div>

      <div class="pill-sep"></div>

      <!-- One dot per element for fast switching -->
      <div id="pillDots">
        <button class="qdot active" data-type="sand"   title="Sand (1)"  style="--c:#e6b84a"></button>
        <button class="qdot"       data-type="water"   title="Water (2)" style="--c:#4a9edd"></button>
        <button class="qdot"       data-type="fire"    title="Fire (3)"  style="--c:#e84a1a"></button>
        <button class="qdot"       data-type="smoke"   title="Smoke (4)" style="--c:#8899aa"></button>
        <button class="qdot"       data-type="wall"    title="Wall (5)"  style="--c:#888"></button>
        <button class="qdot eraser-qdot" data-type="eraser" title="Erase (E)"></button>
      </div>

      <div class="pill-sep"></div>

      <!-- Expand toggle -->
      <button id="expandBtn" aria-expanded="false" title="More options (Tab)">
        <svg id="expandIcon" width="13" height="13" viewBox="0 0 13 13" fill="none"
             stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 8.5l4.5-4 4.5 4"/>
        </svg>
      </button>

    </div><!-- /pill -->

    <!-- Expanded panel - slides up from pill -->
    <div id="panel">
      <div id="panelInner">

        <!-- Color row (only shown for sand / wall) -->
        <div id="colorGroup" class="panel-row">
          <span class="ctrl-label">Colour</span>
          <input type="color" id="colorPicker" value="#e6b84a" title="Colour">
          <label class="toggle-label">
            <input type="checkbox" id="autoHueToggle" checked>
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            <span>Auto hue</span>
          </label>
        </div>

        <div class="panel-divider"></div>

        <!-- Brush size -->
        <div class="panel-row">
          <span class="ctrl-label">Brush</span>
          <input type="range" id="brushSize" min="1" max="8" value="3" step="1">
          <span id="brushSizeVal">3</span>
        </div>

        <div class="panel-divider"></div>

        <!-- Mode -->
        <div class="panel-row">
          <span class="ctrl-label">Mode</span>
          <div class="seg">
            <button class="mode-btn active" data-mode="deposit">Deposit</button>
            <button class="mode-btn"        data-mode="surface">Surface</button>
          </div>
        </div>

        <div class="panel-divider"></div>

        <!-- Reset -->
        <div class="panel-row">
          <button id="resetBtn" title="Clear canvas (R)">
            <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor"
                 stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 7a6 6 0 1 0 1.1-3.4"/><path d="M1 2v3h3"/>
            </svg>
            Reset
          </button>
        </div>

      </div><!-- /panelInner -->
    </div><!-- /panel -->

  </div><!-- /toolbar -->

  <!-- Circular brush cursor -->
  <div id="brushCursor"></div>

  <script src="script.js"></script>
</body>
</html>
